name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.8"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check

      - name: Test
        run: uv run pytest
